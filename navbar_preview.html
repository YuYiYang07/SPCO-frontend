<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SPCO Navbar v3 — Preview</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Zhi+Mang+Xing&family=Noto+Sans+SC:wght@300;400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', sans-serif;
      background: #faf7f2;
      color: #1a1a1a;
    }
    /* Fake hero section to demo scroll behaviour */
    .fake-hero {
      height: 100vh;
      background: linear-gradient(160deg, #faf7f2 0%, #f0ebe0 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
      position: relative;
    }
    .fake-hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(ellipse 700px 500px at 85% 20%, rgba(139,37,0,0.05) 0%, transparent 70%),
        radial-gradient(ellipse 500px 400px at 10% 80%, rgba(26,26,26,0.04) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-label {
      font-family: 'Zhi Mang Xing', cursive;
      font-size: 5rem;
      color: #1a1a1a;
      opacity: 0.8;
      z-index: 1;
    }
    .hero-sub {
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(26,26,26,0.4);
      z-index: 1;
    }
    .scroll-hint {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Inter', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(26,26,26,0.3);
      animation: bounce 2s infinite;
      z-index: 1;
    }
    @keyframes bounce {
      0%,100% { transform: translateX(-50%) translateY(0); }
      50%      { transform: translateX(-50%) translateY(6px); }
    }
    .content-section {
      min-height: 100vh;
      padding: 8rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
    }
    .content-section h2 {
      font-family: 'Zhi Mang Xing', cursive;
      font-size: 3rem;
      color: rgba(26,26,26,0.7);
    }
    .content-section p {
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      color: rgba(26,26,26,0.4);
      letter-spacing: 0.05em;
      max-width: 400px;
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- ✦ The Navbar Component ✦ -->
  <spco-navbar data-lang="en"></spco-navbar>

  <!-- Fake hero to demo scroll collapse -->
  <div class="fake-hero">
    <div class="hero-label">华乐</div>
    <div class="hero-sub">Singapore Polytechnic Chinese Orchestra</div>
    <div class="scroll-hint">↓ scroll to see navbar collapse</div>
  </div>

  <!-- Some content so you can scroll -->
  <div class="content-section">
    <h2>分部</h2>
    <p>Scroll back up to see 新加坡理工学院華樂团 collapse to 華樂 only.</p>
    <p style="margin-top:0.5rem; font-size:0.75rem; color:rgba(26,26,26,0.3);">
      Resize window to ≤ 781px to see mobile hamburger menu.
    </p>
  </div>
  <div class="content-section" style="background:#f5f0e8;">
    <h2>消息</h2>
    <p>水墨同心圆 (top right) opens lang switch · login · settings popover on desktop.</p>
  </div>

  <!-- Load the navbar web component -->
  <script src="./scripts/navbar.js"></script>

</body>
</html>
